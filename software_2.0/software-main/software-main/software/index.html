<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <script>
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      document.write('<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' + (coverSupport ? ', viewport-fit=cover' : '') + '" />')
    </script>
    <title>AI数字人景区导览系统</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/",
          "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1.0.6/lib/three-vrm.module.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js'
      import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.164.0/examples/jsm/loaders/GLTFLoader.js'
      import { AnimationMixer, AnimationClip } from 'https://cdn.jsdelivr.net/npm/three@0.164.0/build/three.module.js'
      
      import { VRMLoaderPlugin, VRM } from 'https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@1.0.6/lib/three-vrm.module.js'
      
      window.THREE = THREE
      window.GLTFLoader = GLTFLoader
      window.AnimationMixer = AnimationMixer
      window.AnimationClip = AnimationClip
      window.VRMLoaderPlugin = VRMLoaderPlugin
      window.VRM = VRM
      
      window.dispatchEvent(new CustomEvent('three-ready'))
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
